trigger:
- main

schedules:
- cron: "0 0 * * 0" 
  displayName: "Weekly Run & Free Tier Check"
  branches:
    include:
      - main
  always: true 

pool:
  vmImage: 'ubuntu-latest' 

variables:
  azure-service-connection: 'azure-service-connection'
  terraform-dir: '$(System.DefaultWorkingDirectory)/MultiTenantGateway.App/devops/terraform'
  bk-rg: 'free-tfstate-rg'
  bk-storage: 'freetfstate243a36' # Output from bootstrap.sh
  bk-container: 'tfstate-container'
  bk-key: 'prod.terraform.tfstate'
  buildConfiguration: 'Release'

stages:
- stage: Provision_And_Build
  jobs:
  - job: Run_Terraform
    displayName: 'Provision Infrastructure'
    steps:
    - task: DownloadSecureFile@1
      name: clientMetadataFile
      inputs: { secureFile: 'clients.json' }

    - script: |
        # Strips out newlines and spacing formatting to compile a single-line string payload
        JSON_PAYLOAD=$(jq -c . $(clientMetadataFile.secureFilePath))
        
        # FIX: Swapped 'var=' for 'variable=' to align with Azure DevOps logging protocols
        echo "##vso[task.setvariable variable=TF_VAR_client_config_json]$JSON_PAYLOAD"
      displayName: 'Parse Dynamic Secrets Matrix'

    - task: TerraformInstaller@1
      inputs: { terraformVersion: 'latest' }

    - task: TerraformTaskV4@4
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(terraform-dir)'
        backendServiceArm: '$(azure-service-connection)'
        backendAzureRmResourceGroupName: '$(bk-rg)'
        backendAzureRmStorageAccountName: '$(bk-storage)'
        backendAzureRmContainerName: '$(bk-container)'
        backendAzureRmKey: '$(bk-key)'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Apply'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(terraform-dir)'
        environmentServiceNameAzureRM: '$(azure-service-connection)'
      env:
        TF_VAR_client_config_json: $(TF_VAR_client_config_json)

  - job: Compile_DotNet_Application
    displayName: 'Build and Publish .NET App'
    dependsOn: Run_Terraform
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        version: '10.x'
        includePreviewVersions: true

    - task: DotNetCoreCLI@2
      displayName: 'Dotnet Restore'
      inputs:
        command: 'restore'
        projects: '$(System.DefaultWorkingDirectory)/MultiTenantGateway.App/MultiTenantGateway.App.csproj'
        feedsToUse: 'select'

    - task: DotNetCoreCLI@2
      displayName: 'Dotnet Build'
      inputs:
        command: 'build'
        projects: '$(System.DefaultWorkingDirectory)/MultiTenantGateway.App/MultiTenantGateway.App.csproj'
        arguments: '--configuration $(buildConfiguration)'

    - task: DotNetCoreCLI@2
      displayName: 'Dotnet Publish'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '$(System.DefaultWorkingDirectory)/MultiTenantGateway.App/MultiTenantGateway.App.csproj'
        # FIX: Output directly to the staging directory root
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true # Generates MultiTenantGateway.App.zip

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifact: drop'
      inputs:
        # FIX: Point directly to the root staging path where your zip file sits
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'


- stage: Serverless_Deploy
  displayName: 'Deploy Serverless Assets'
  dependsOn: Provision_And_Build
  jobs:
  - job: Execute_Deployment
    steps:
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureFunctionApp@2
      displayName: 'Deploy to Flex Consumption Function App'
      inputs:
        connectedServiceNameARM: 'azure-service-connection'
        appType: 'functionAppLinux'
        appName: 'free-client-api-gateway'
        package: '$(System.ArtifactsDirectory)/drop/**/*.zip'
        isFlexConsumption: true

- stage: Portfolio_Mirror
  dependsOn: Serverless_Deploy
  jobs:
  - job: SanitizeAndMirrorToGitHub
    variables:
    - group: 'gateway-global-vars'
    steps:
    - checkout: self
      persistCredentials: true 
    - script: |
        git config --global user.name "Net Industries, Inc. Automated Pipeline"
        git config --global user.email "devops-automation@nii.internal"
        rm -rf .terraform/
        rm -f .terraform.lock.hcl
        rm -f clients.json
        git remote add github-target "https://oauth2:$GITHUB_PAT_SECRET@github.com/$GITHUB_USER/$GITHUB_REPO"
        # Create an orphan branch (disconnects all files from previous history)
        git checkout --orphan standalone-main
        # Commit the files cleanly as a standalone snapshot
        git add -A
        git commit -m "Sync latest state from Azure DevOps"
        # Force-push this single commit to overwrite GitHub's main branch
        git push -f github-target standalone-main:main
      displayName: 'Sanitize Secrets and Mirror to Public GitHub Portfolio'
      env:
        GITHUB_PAT_SECRET: $(GITHUB_PAT)
        GITHUB_USER: $(GITHUB_USER)
        GITHUB_REPO: $(GITHUB_REPO)
